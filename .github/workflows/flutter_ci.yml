name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: tracking_training_flutter
        run: flutter pub get

      - name: Analyze
        working-directory: tracking_training_flutter
        run: flutter analyze

      - name: Test
        working-directory: tracking_training_flutter
        run: flutter test
