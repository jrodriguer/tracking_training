name: Analyze

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install Flutter (includes Dart)
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies (server)
        working-directory: tracking_training_server
        run: dart pub get

      - name: Analyze (server)
        working-directory: tracking_training_server
        run: dart analyze --fatal-infos
